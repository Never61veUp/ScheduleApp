services:
  scheduleapp.api:
    image: scheduleapp.api
    build:
      context: .
      dockerfile: ScheduleApp.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      JWT_KEY: "${JWT_KEY}"
      JWT_ISSUER: "MiniApp"
      JWT_AUDIENCE: "MiniApp"
  client:
    build:
      context: ../miniapp
      dockerfile: Dockerfile
    depends_on:
      - scheduleapp.api
    ports:
      - "5173:80"