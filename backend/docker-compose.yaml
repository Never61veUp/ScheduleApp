version: "3.9"

services:
  scheduleapp-api:
    container_name: scheduleapp-api
    build:
      context: .
      dockerfile: ScheduleApp.API/Dockerfile
    depends_on:
      - postgres
    environment:
      DP_KEYS_FOLDER: "/keys"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      JWT_KEY: "${JWT_KEY}"
      JWT_ISSUER: "MiniApp"
      JWT_AUDIENCE: "MiniApp"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    volumes:
      - scheduleapp-keys:/keys
    labels:
      - traefik.enable=true
      - traefik.http.routers.scheduleapp-api.rule=Host(`api.schedule.mixdev.me`)
      - traefik.http.routers.scheduleapp-api.entrypoints=https
      - traefik.http.routers.scheduleapp-api.tls.certresolver=letsencrypt
      - traefik.http.services.scheduleapp-api.loadbalancer.server.port=8080

  client:
    build:
      context: ../miniapp
      dockerfile: Dockerfile
    depends_on:
      - scheduleapp-api
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.client.rule=Host(`schedule.mixdev.me`)
      - traefik.http.routers.client.entrypoints=https
      - traefik.http.routers.client.tls.certresolver=letsencrypt
      - traefik.http.services.client.loadbalancer.server.port=80

  postgres:
    image: postgres:18.3
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
volumes:
  scheduleapp-keys: