version: "3.9"

services:
  scheduleapp.api:
    build:
      context: .
      dockerfile: ScheduleApp.API/Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      JWT_KEY: "${JWT_KEY}"
      JWT_ISSUER: "MiniApp"
      JWT_AUDIENCE: "MiniApp"
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
    expose:
      - "5000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.schedule.mixdev.me`)
      - traefik.http.routers.api.entrypoints=https
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=5000

  client:
    build:
      context: ../miniapp
      dockerfile: Dockerfile
    depends_on:
      - scheduleapp.api
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.client.rule=Host(`schedule.mixdev.me`)
      - traefik.http.routers.client.entrypoints=https
      - traefik.http.routers.client.tls.certresolver=letsencrypt
      - traefik.http.services.client.loadbalancer.server.port=80